name: Update Market Database

on:
  schedule:
    # Run every 4 hours on weekdays
    - cron: '0 */4 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run update script
        run: python update_db.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add db_nominal.csv db_adjusted.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database [skip ci]" && git push)
